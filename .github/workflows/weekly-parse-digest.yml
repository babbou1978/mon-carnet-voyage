name: Weekly parser digest

# Each Monday at 09:00 UTC, fetch the past week's unclear parse-intent terms,
# ask Claude to suggest prompt improvements, and open a GitHub issue with
# the digest so the user can validate and merge the additions.
#
# Manually triggerable via the "Run workflow" button as well.

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Use Node 24 from the start — no JavaScript actions involved, so
      # the Node 20 deprecation warning from actions/github-script@v7
      # disappears entirely.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run weekly digest
        env:
          DIGEST_URL: https://outsy-ai.vercel.app/api/weekly-parse-digest
          DIGEST_SECRET: ${{ secrets.WEEKLY_DIGEST_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/weekly-digest.mjs
