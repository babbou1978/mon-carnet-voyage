name: Notify Telegram on Vercel deploy

# Vercel pushes deployment_status events to GitHub for every deploy.
# We listen to those and forward a formatted message to a Telegram chat.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN  – from @BotFather
#   TELEGRAM_CHAT_ID    – your private chat id with the bot

on:
  deployment_status:

jobs:
  notify:
    # Only relay completed states (skip the noisy in_progress / queued)
    if: github.event.deployment_status.state == 'success' || github.event.deployment_status.state == 'failure' || github.event.deployment_status.state == 'error'
    runs-on: ubuntu-latest
    steps:
      - name: Build and send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATE: ${{ github.event.deployment_status.state }}
          ENV: ${{ github.event.deployment.environment }}
          REF: ${{ github.event.deployment.ref }}
          SHA: ${{ github.event.deployment.sha }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
          REPO: ${{ github.repository }}
          COMMIT_MSG: ${{ github.event.deployment.payload.commit_message }}
        run: |
          # Pick an emoji based on state
          case "$STATE" in
            success) ICON="🚀" ;;
            failure) ICON="❌" ;;
            error)   ICON="⚠️" ;;
            *)       ICON="📦" ;;
          esac

          # Mark prod vs preview clearly
          if [ "$ENV" = "Production" ] || [ "$ENV" = "production" ]; then
            ENV_LINE="🌐 *PROD*"
          else
            ENV_LINE="🧪 preview (\`$ENV\`)"
          fi

          SHORT_SHA="${SHA:0:7}"
          COMMIT_LINE=""
          if [ -n "$COMMIT_MSG" ]; then
            FIRST_LINE=$(printf "%s" "$COMMIT_MSG" | head -n1 | cut -c1-120)
            COMMIT_LINE=$'\n'"📝 $FIRST_LINE"
          fi

          TEXT="${ICON} *${REPO##*/}* — \`${STATE}\`"$'\n'"${ENV_LINE}"$'\n'"🌿 \`${REF}\` · \`${SHORT_SHA}\`${COMMIT_LINE}"$'\n'"🔗 ${TARGET_URL}"

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data "$(jq -nc \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$TEXT" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}')"
